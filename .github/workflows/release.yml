name: release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: setup jdk 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.0'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: read metadata
        id: metadata
        run: |
          echo "version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"
          echo "minecraft=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:'- %s')
          else
            LOG=$(git log --pretty=format:'- %s')
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: publish to modrinth & github
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # ---- artifacts ----
          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar
            build/libs/*-@(dev|sources|javadoc).jar

          # ---- release info ----
          name: Build Bugs ${{ steps.metadata.outputs.version }}
          version: ${{ steps.metadata.outputs.version }}
          version-type: release
          changelog: ${{ steps.changelog.outputs.log }}

          # ---- metadata (loaders/deps auto-read from fabric.mod.json) ----
          loaders: fabric
          game-versions: ${{ steps.metadata.outputs.minecraft }}
          java: 25

          # ---- modrinth ----
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # ---- github release ----
          github-tag: ${{ github.ref_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
